<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWeather Activity</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h1><i class="fas fa-cloud-sun"></i> SmartWeather</h1>
        <p>Prediksi cuaca & rekomendasi aktivitas</p>
      </div>

      <div class="weather-card">
        <div class="weather-main">
          <div>
            <div class="temp" id="temperature">--°C</div>
            <div class="condition" id="condition">Memuat...</div>
          </div>
          <i class="fas fa-cloud-sun fa-3x"></i>
        </div>
        <div class="location" id="location">Mendeteksi lokasi...</div>
      </div>

      <div class="activity-card">
        <h3>Pilih Aktivitas</h3>
        <select id="activitySelect">
          <option value="kota">Berangkat ke Kota</option>
          <option value="swalayan">Pergi ke Swalayan</option>
          <option value="sekolah">Berangkat ke Sekolah</option>
          <option value="olahraga">Olahraga Outdoor</option>
        </select>
        <button onclick="checkRecommendation()">Lihat Rekomendasi</button>
        <div class="recommendation" id="recommendationBox">
          Pilih aktivitas untuk melihat saran cuaca.
        </div>
      </div>

      <div class="forecast-card">
        <h3>Prakiraan 2 Jam Ke Depan</h3>
        <div class="forecast-grid" id="forecastGrid"></div>
      </div>

      <div class="history-card">
        <h3>Riwayat Aktivitas</h3>
        <div id="historyList"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
